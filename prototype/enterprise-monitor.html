<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EnterpriseMonitor - AI驱动的企业全域智能经营仪表盘</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-primary:#0a0e17;--bg-secondary:#111827;--bg-card:#1a1f2e;--bg-card-hover:#242a3d;--bg-panel:#131820;
  --border-color:#2a3148;--border-light:#1e2538;
  --text-primary:#e5e7eb;--text-secondary:#9ca3af;--text-muted:#6b7280;--text-bright:#f9fafb;
  --accent-blue:#3b82f6;--accent-cyan:#06b6d4;--accent-green:#10b981;--accent-yellow:#f59e0b;
  --accent-orange:#f97316;--accent-red:#ef4444;--accent-purple:#8b5cf6;--accent-pink:#ec4899;
  --green-bg:rgba(16,185,129,.12);--red-bg:rgba(239,68,68,.12);--yellow-bg:rgba(245,158,11,.12);
  --blue-bg:rgba(59,130,246,.12);--orange-bg:rgba(249,115,22,.12);--purple-bg:rgba(139,92,246,.12);
  --font-mono:'SF Mono','Cascadia Code','Fira Code','JetBrains Mono',monospace;
  --font-sans:-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif;
  --radius-sm:4px;--radius-md:6px;--radius-lg:8px;
  --topbar-height:38px;--left-width:48px;
}
html,body{height:100%;font-family:var(--font-sans);background:var(--bg-primary);color:var(--text-primary);font-size:12px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border-color);border-radius:3px}

/* === App shell: topbar + main === */
.app{display:flex;flex-direction:column;height:100vh}
.topbar{height:var(--topbar-height);background:var(--bg-secondary);border-bottom:1px solid var(--border-color);display:flex;align-items:center;padding:0 10px;gap:6px;flex-shrink:0;z-index:100}
.main-wrap{flex:1;display:flex;overflow:hidden}

/* === Left icon sidebar (like WM) === */
.left-icons{width:var(--left-width);background:var(--bg-panel);border-right:1px solid var(--border-color);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:2px;flex-shrink:0;overflow-y:auto}
.li-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);cursor:pointer;color:var(--text-muted);transition:all .15s;border:none;background:none;font-size:16px;position:relative}
.li-btn:hover{background:var(--bg-card);color:var(--text-primary)}
.li-btn.active{background:var(--blue-bg);color:var(--accent-blue)}
.li-btn .badge{position:absolute;top:2px;right:2px;min-width:14px;height:14px;border-radius:7px;font-size:8px;font-weight:700;font-family:var(--font-mono);display:flex;align-items:center;justify-content:center;padding:0 3px}
.li-sep{width:24px;height:1px;background:var(--border-color);margin:4px 0}

/* === 2-column content (WM style: left ~60%, right ~40%) === */
.content-body{flex:1;display:flex;overflow:hidden}
.col-left{flex:0 0 60%;max-width:60%;display:flex;flex-direction:column;overflow:hidden;border-right:1px solid var(--border-color)}
.col-right{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Map area: upper-left, about 42% viewport height */
.map-area{flex:0 0 42vh;position:relative;background:var(--bg-primary);border-bottom:1px solid var(--border-color);overflow:hidden}
.map-area svg{width:100%;height:100%}
.map-controls{position:absolute;top:8px;left:8px;display:flex;gap:4px}
.map-ctrl-btn{background:rgba(17,24,39,.85);border:1px solid var(--border-color);border-radius:var(--radius-sm);padding:3px 8px;font-size:10px;color:var(--text-secondary);cursor:pointer;backdrop-filter:blur(4px)}
.map-ctrl-btn.active{background:var(--accent-blue);color:#fff;border-color:var(--accent-blue)}
.map-legend{position:absolute;bottom:8px;left:8px;display:flex;gap:8px;font-size:9px;background:rgba(10,14,23,.8);padding:3px 8px;border-radius:var(--radius-sm)}

/* Below-map scrollable area */
.below-map{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}

/* Right column scrollable */
.right-scroll{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:1px}

/* === Topbar elements === */
.logo{font-size:13px;font-weight:700;color:var(--text-bright);letter-spacing:-.3px;white-space:nowrap}
.logo-sub{font-size:9px;color:var(--accent-blue);margin-left:4px;font-weight:400}
.ehi-badge{display:flex;align-items:center;gap:4px;background:var(--green-bg);border:1px solid rgba(16,185,129,.3);padding:2px 8px;border-radius:var(--radius-md);cursor:pointer}
.ehi-badge .score{font-size:14px;font-weight:700;color:var(--accent-green);font-family:var(--font-mono)}
.ehi-badge .label{font-size:8px;color:var(--text-muted);text-transform:uppercase}
.top-sep{width:1px;height:18px;background:var(--border-color)}
.top-spacer{flex:1}
.nav-tabs{display:flex;gap:1px;background:var(--border-color);border-radius:var(--radius-md);overflow:hidden}
.nav-tab{padding:3px 12px;font-size:10px;cursor:pointer;background:var(--bg-card);color:var(--text-muted);transition:all .15s;border:none;white-space:nowrap}
.nav-tab.active{background:var(--accent-blue);color:#fff}
.nav-tab:hover:not(.active){background:var(--bg-card-hover);color:var(--text-primary)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--accent-green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.live-label{font-size:9px;color:var(--accent-green);font-weight:600;font-family:var(--font-mono)}
.alert-pills{display:flex;gap:3px}
.alert-pill{font-size:9px;font-weight:600;font-family:var(--font-mono);padding:1px 6px;border-radius:3px;cursor:pointer}
.search-box{display:flex;align-items:center;gap:4px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:2px 8px;cursor:pointer}
.search-box:hover{border-color:var(--accent-blue)}
.search-box span{font-size:10px;color:var(--text-muted)}
.search-box kbd{font-size:8px;color:var(--text-muted);background:var(--bg-secondary);padding:1px 4px;border-radius:2px;font-family:var(--font-mono)}
.icon-btn{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border-radius:var(--radius-md);cursor:pointer;color:var(--text-muted);transition:all .15s;border:none;background:none;font-size:13px}
.icon-btn:hover{background:var(--bg-card);color:var(--text-primary)}
.avatar{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent-blue),var(--accent-purple));display:flex;align-items:center;justify-content:center;font-size:9px;color:#fff;font-weight:600;cursor:pointer}

/* === Panel cards === */
.panel{background:var(--bg-card);border-bottom:1px solid var(--border-color);overflow:hidden}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:rgba(255,255,255,.02);border-bottom:1px solid var(--border-light)}
.panel-title{display:flex;align-items:center;gap:4px;font-size:10px;font-weight:600;color:var(--text-bright);text-transform:uppercase;letter-spacing:.5px}
.panel-title .icon{font-size:11px}
.panel-tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:600;font-family:var(--font-mono)}
.tag-critical{background:var(--red-bg);color:var(--accent-red)}
.tag-high{background:var(--orange-bg);color:var(--accent-orange)}
.tag-medium{background:var(--yellow-bg);color:var(--accent-yellow)}
.tag-info{background:var(--blue-bg);color:var(--accent-blue)}
.tag-opportunity{background:var(--green-bg);color:var(--accent-green)}
.tag-ai{background:var(--purple-bg);color:var(--accent-purple)}
.panel-body{padding:6px 10px}
.panel-footer{padding:4px 10px;border-top:1px solid var(--border-light);font-size:9px;color:var(--text-muted);line-height:1.5;background:rgba(139,92,246,.04)}
.panel-footer .ai-icon{color:var(--accent-purple);margin-right:2px}
.panel-tabs{display:flex;gap:2px;padding:4px 10px 2px;overflow-x:auto}
.ptab{font-size:9px;padding:2px 7px;border-radius:10px;cursor:pointer;color:var(--text-muted);background:none;border:1px solid transparent;transition:all .15s;white-space:nowrap}
.ptab.active{background:var(--blue-bg);border-color:rgba(59,130,246,.3);color:var(--accent-blue)}
.ptab:hover:not(.active){color:var(--text-secondary)}

/* === Reusable === */
.sparkline{display:inline-block;vertical-align:middle}
.sparkline-bar{display:inline-block;width:2px;margin-right:1px;border-radius:1px;vertical-align:bottom}
.score-cell{font-family:var(--font-mono);font-weight:700;font-size:11px}
.score-green{color:var(--accent-green)}.score-blue{color:var(--accent-blue)}.score-yellow{color:var(--accent-yellow)}
.score-orange{color:var(--accent-orange)}.score-red{color:var(--accent-red)}
.mini-bar{height:4px;border-radius:2px;background:rgba(255,255,255,.06);overflow:hidden}
.mini-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.trend-up{color:var(--accent-green)}.trend-down{color:var(--accent-red)}.trend-flat{color:var(--text-muted)}
.row-item{display:flex;align-items:center;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03);gap:4px;cursor:pointer;transition:background .15s}
.row-item:hover{background:rgba(255,255,255,.02)}.row-item:last-child{border-bottom:none}
.signal-row{padding:1px 0 1px 14px;font-size:9px;color:var(--text-muted);display:flex;align-items:center;gap:3px}
.metric-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:4px}
.metric-card{background:rgba(255,255,255,.03);border:1px solid var(--border-light);border-radius:var(--radius-md);padding:5px 6px}
.metric-card .mc-label{font-size:7px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.5px}
.metric-card .mc-value{font-size:14px;font-weight:700;font-family:var(--font-mono);color:var(--text-bright)}
.metric-card .mc-sub{font-size:8px;color:var(--text-muted)}
.feed-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04)}.feed-item:last-child{border-bottom:none}
.feed-top{display:flex;align-items:center;gap:4px;margin-bottom:2px}
.feed-time{font-size:8px;color:var(--text-muted);font-family:var(--font-mono)}
.feed-source{font-size:8px;color:var(--text-muted);padding:0 3px;background:rgba(255,255,255,.05);border-radius:2px}
.feed-title{font-size:10px;color:var(--text-primary);line-height:1.4}
.feed-meta{font-size:9px;color:var(--text-muted);line-height:1.3}
.funnel-row{display:flex;align-items:center;gap:4px;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.03)}.funnel-row:last-child{border-bottom:none}
.funnel-stage{width:46px;font-size:9px;color:var(--text-secondary);flex-shrink:0}
.funnel-count{width:22px;text-align:right;font-family:var(--font-mono);font-size:10px;color:var(--text-primary);flex-shrink:0}
.funnel-bar-track{flex:1;height:10px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.funnel-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.res-row{display:flex;align-items:center;gap:5px;padding:2px 0}
.res-name{width:50px;font-size:9px;color:var(--text-secondary);flex-shrink:0}
.res-bar-track{flex:1;height:6px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:3px;transition:width .6s}
.res-pct{width:28px;text-align:right;font-family:var(--font-mono);font-size:9px;flex-shrink:0;font-weight:600}
.rev-row{display:flex;align-items:center;gap:5px;padding:3px 0}
.rev-label{width:44px;font-size:9px;color:var(--text-secondary);flex-shrink:0}
.rev-bar-track{flex:1;height:5px;background:rgba(255,255,255,.04);border-radius:3px;overflow:hidden}
.rev-bar-fill{height:100%;border-radius:3px}
.rev-amount{width:58px;text-align:right;font-family:var(--font-mono);font-size:9px;color:var(--text-primary);flex-shrink:0}
.rev-pct{width:34px;text-align:right;font-family:var(--font-mono);font-size:9px;flex-shrink:0}
.pred-row{display:flex;align-items:center;gap:5px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}.pred-row:last-child{border-bottom:none}
.pred-name{flex:1;font-size:9px;color:var(--text-primary);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pred-bar-track{width:60px;height:4px;background:rgba(255,255,255,.06);border-radius:3px;overflow:hidden;flex-shrink:0}
.pred-bar-fill{height:100%;border-radius:3px}
.pred-pct{width:26px;text-align:right;font-family:var(--font-mono);font-size:9px;font-weight:600;flex-shrink:0}
.dep-node{display:inline-flex;align-items:center;gap:3px;background:var(--bg-card);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:2px 5px;font-size:9px;margin:2px;cursor:pointer;transition:all .15s}
.dep-node:hover{border-color:var(--accent-blue);background:var(--bg-card-hover)}
.compete-row{display:flex;align-items:center;gap:4px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.03)}.compete-row:last-child{border-bottom:none}

/* EHI gauge (like WM's score circle) */
.ehi-gauge{width:80px;height:80px;position:relative;flex-shrink:0}
.ehi-gauge svg{width:100%;height:100%}
.ehi-gauge .gauge-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.ehi-gauge .gauge-num{font-size:22px;font-weight:700;font-family:var(--font-mono);line-height:1}
.ehi-gauge .gauge-label{font-size:7px;color:var(--text-muted);text-transform:uppercase}

/* AI Chat FAB */
.ai-chat-fab{position:fixed;bottom:14px;right:14px;width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(139,92,246,.4);z-index:200;transition:transform .2s}
.ai-chat-fab:hover{transform:scale(1.1)}

/* AI Brief KPI */
.ai-kpi-row{display:flex;gap:4px;flex-wrap:wrap}
.ai-kpi{background:rgba(255,255,255,.03);border:1px solid var(--border-light);border-radius:var(--radius-sm);padding:3px 6px}
.ai-kpi .k-label{font-size:7px;color:var(--text-muted);text-transform:uppercase}
.ai-kpi .k-value{font-size:12px;font-weight:700;font-family:var(--font-mono)}
.ai-kpi .k-sub{font-size:8px}

/* Bottom bar */
.bottombar{height:24px;background:var(--bg-secondary);border-top:1px solid var(--border-color);display:flex;align-items:center;padding:0 10px;gap:10px;font-size:9px;color:var(--text-muted);flex-shrink:0}
.bottombar a{color:var(--text-muted);text-decoration:none}.bottombar a:hover{color:var(--accent-blue)}

@keyframes fadeIn{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:1200px){.col-left{flex:0 0 55%;max-width:55%}}
@media(max-width:900px){.col-left{flex:0 0 100%;max-width:100%}.col-right{display:none}.left-icons{display:none}}
</style>
</head>

// ========== UTILS ==========
function scoreColor(s){return s>=80?'score-green':s>=60?'score-blue':s>=40?'score-yellow':s>=20?'score-orange':'score-red'}
function scoreDot(s){return s>=80?'var(--accent-green)':s>=60?'var(--accent-blue)':s>=40?'var(--accent-yellow)':s>=20?'var(--accent-orange)':'var(--accent-red)'}
function dimColor(v){if(v>=80)return`background:${scoreDot(v)};color:#fff`;if(v>=60)return'background:rgba(59,130,246,.2);color:var(--accent-blue)';if(v>=40)return'background:rgba(245,158,11,.2);color:var(--accent-yellow)';return'background:rgba(239,68,68,.2);color:var(--accent-red)'}
function trendIcon(t){return t==='up'?'<span class="trend-up">▲</span>':t==='down'?'<span class="trend-down">▼</span>':'<span class="trend-flat">─</span>'}
function levelClass(l){return{CRITICAL:'tag-critical',HIGH:'tag-high',MEDIUM:'tag-medium',INFO:'tag-info',OPPORTUNITY:'tag-opportunity',ALERT:'tag-high',LOW:'tag-info'}[l]||'tag-info'}
function sparkHTML(data,h=10){const mx=Math.max(...data);return`<span class="sparkline" style="height:${h}px">${data.map(v=>{const bh=Math.max(2,(v/mx)*h);const c=v>=mx*.7?'var(--accent-green)':v>=mx*.4?'var(--accent-blue)':'var(--accent-red)';return`<span class="sparkline-bar" style="height:${bh}px;background:${c}"></span>`}).join('')}</span>`}
function barColor(p){return p>=80?'var(--accent-green)':p>=60?'var(--accent-blue)':p>=40?'var(--accent-yellow)':'var(--accent-red)'}
function statusDot(s){return{healthy:'var(--accent-green)',normal:'var(--accent-blue)',warn:'var(--accent-yellow)',danger:'var(--accent-red)'}[s]||'var(--text-muted)'}

function switchDim(dimId){
  currentDim=dimId;

  document.querySelectorAll('.left-icons .li-btn[data-dim]').forEach(el=>{el.classList.toggle('active',el.dataset.dim===dimId)});

}

      <div style="background:var(--bg-secondary);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);padding:6px 8px;font-size:10px;color:var(--text-secondary);line-height:1.5;max-width:240px">你好！问我经营问题。试试：<span style="color:var(--accent-purple)">"回款风险最高？"</span></div></div>
    </div>
    <div style="padding:5px 8px;border-top:1px solid var(--border-light);display:flex;gap:3px"><input type="text" placeholder="问我经营问题..." style="flex:1;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:var(--radius-md);padding:4px 6px;color:var(--text-primary);font-size:10px;outline:none" onkeydown="if(event.key==='Enter')aiSend(this)"><button style="background:var(--accent-purple);border:none;border-radius:var(--radius-md);padding:4px 8px;color:#fff;font-size:9px;cursor:pointer" onclick="aiSend(this.previousElementSibling)">发送</button></div>`;
  document.body.appendChild(c)}

function aiSend(input){
  const q=input.value.trim();if(!q)return;
  const cb=document.getElementById('chat-body');
  cb.innerHTML+=`<div style="display:flex;gap:5px;margin:6px 0;justify-content:flex-end"><div style="background:var(--accent-blue);border-radius:var(--radius-lg) 0 var(--radius-lg) var(--radius-lg);padding:5px 8px;font-size:10px;color:#fff;max-width:200px">${q}</div></div>`;
  input.value='';
  setTimeout(()=>{
    let a='正在分析...';
    if(q.includes('回款')||q.includes('风险'))a='回款风险TOP3：<br>1.<strong style="color:var(--accent-red)">某市公安</strong> ¥340万逾期45天<br>2.<strong style="color:var(--accent-orange)">某省交通</strong> ¥280万超60天<br>3.<strong style="color:var(--accent-yellow)">某电力</strong> ¥120万逾期32天';
    else if(q.includes('收入')||q.includes('Q2'))a='Q2预测<strong style="color:var(--accent-cyan)">¥9,200万</strong>(72%达成，置信68%)';
    else if(q.includes('政策')||q.includes('利好'))a='近7天利好3条：<br>1.📢<strong>数字政府指导意见</strong>(92%)<br>2.📋<strong>广东数字经济条例</strong>(85%)<br>3.📋<strong>公安厅采购¥2,200万</strong>(95%)';
    cb.innerHTML+=`<div style="display:flex;gap:5px;margin:6px 0"><div style="width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent-purple),var(--accent-blue));display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0">🧠</div><div style="background:var(--bg-secondary);border-radius:0 var(--radius-lg) var(--radius-lg) var(--radius-lg);padding:6px 8px;font-size:10px;color:var(--text-secondary);line-height:1.4;max-width:240px">${a}</div></div>`;
    cb.scrollTop=cb.scrollHeight},400)}

// ========== KEYBOARD ==========
document.addEventListener('keydown',e=>{
  if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();showSearch()}
  if(e.key==='Escape'){document.querySelectorAll('div[style*="position:fixed"][style*="z-index:1000"]').forEach(m=>m.remove());const c=document.getElementById('ai-chat-panel');if(c)c.remove()}
});

// ========== LIVE CLOCK ==========
setInterval(()=>{const t=document.getElementById('live-time');if(t){const n=new Date();t.textContent=`${n.getHours().toString().padStart(2,'0')}:${n.getMinutes().toString().padStart(2,'0')}:${n.getSeconds().toString().padStart(2,'0')}`}},1000);

// ========== INIT ==========
function init(){
  document.getElementById('app').innerHTML=
    renderTopbar()+
    `<div class="main-wrap">`+
      renderLeftIcons()+
      `<div class="content-body">`+
        `<div class="col-left">`+
          renderMap()+
          `<div class="below-map" id="below-map">${renderLeftCol()}</div>`+
        `</div>`+
        `<div class="col-right"><div class="right-scroll" id="right-scroll">${renderRightCol()}</div></div>`+
      `</div>`+
    `</div>`+
    `<div class="bottombar"><span>BingoEagle Monitor</span><span class="top-spacer"></span><a>Status</a><a>Docs</a><a>GitHub</a></div>`+
    `<button class="ai-chat-fab" onclick="toggleAIChat()">🧠</button>`;
}
init();
</script>
</body>
</html>
