<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BingoEagle - AI驱动的企业全域智能经营仪表盘</title>
<style>
/* ===== RESET ===== */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}

/* ===== CSS V应收账款IABLES (WM-style dark theme) ===== */
:root{
  --bg:#0a0a0a;
  --bg-secondary:#111;
  --surface:#141414;
  --surface-hover:#1e1e1e;
  --surface-active:#1a1a2e;
  --border:#2a2a2a;
  --border-strong:#444;
  --border-subtle:#1a1a1a;
  --text:#e8e8e8;
  --text-secondary:#ccc;
  --text-dim:#888;
  --text-muted:#666;
  --text-faint:#555;
  --accent:#fff;
  --overlay-subtle:rgba(255,255,255,.03);
  --overlay-light:rgba(255,255,255,.05);
  --overlay-medium:rgba(255,255,255,.1);
  --shadow-color:rgba(0,0,0,.5);
  --input-bg:#1a1a1a;
  --panel-bg:#141414;
  --panel-border:#2a2a2a;
  --map-bg:#020a08;
  --map-grid:#0a2a20;
  --map-country:#0a2018;
  --map-stroke:#0f5040;
  /* Semantic colors */
  --red:#ff4444;
  --green:#44ff88;
  --yellow:#ffaa00;
  --blue:#3388ff;
  --orange:#ff8800;
  --purple:#8b5cf6;
  --cyan:#06b6d4;
  --semantic-critical:#ff4444;
  --semantic-high:#ff8800;
  --semantic-elevated:#ffaa00;
  --semantic-normal:#44aa44;
  --semantic-low:#3388ff;
  --semantic-positive:#44ff88;
  /* Fonts */
  --font-mono:"SF Mono","Monaco","Cascadia Code","Fira Code","DejaVu Sans Mono","Liberation Mono",monospace;
  --font-body:var(--font-mono);
}

/* ===== BASE ===== */
html,body{height:100%;font-family:var(--font-body);background:var(--bg);color:var(--text);font-size:12px;line-height:1.5;overflow:hidden}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== APP SHELL: flex column, 100vh ===== */
#app{display:flex;flex-direction:column;height:100vh;width:100vw;position:absolute;top:0;left:0;right:0;bottom:0}

/* ===== HEADER (40px, WM-style) ===== */
.header{display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:var(--surface);border-bottom:1px solid var(--border);height:40px;flex-shrink:0}
.header-left{display:flex;align-items:center;gap:16px}
.header-center{display:flex;align-items:center;gap:8px}
.header-right{display:flex;align-items:center;gap:12px}
.logo{font-weight:700;font-size:14px;letter-spacing:2px;color:var(--accent);text-transform:uppercase}
.logo-sub{font-size:9px;color:var(--text-dim);letter-spacing:0;text-transform:none;margin-left:6px;font-weight:400}
.version-badge{font-size:9px;color:var(--text-muted);background:var(--border);padding:1px 6px;border-radius:2px}
.status-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse-dot 2s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
.header-clock{font-size:11px;font-family:var(--font-mono);color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase}
.header-btn{background:none;border:1px solid var(--border);padding:4px 10px;font-size:11px;color:var(--text-dim);cursor:pointer;font-family:var(--font-mono);transition:all .15s}
.header-btn:hover{border-color:var(--text-muted);color:var(--text)}
.header-btn.active{background:var(--overlay-medium);color:var(--text)}
.ehi-badge{display:flex;align-items:center;gap:6px;border:1px solid rgba(68,255,136,.3);padding:3px 10px;cursor:pointer;background:rgba(68,255,136,.06)}
.ehi-badge .score{font-size:14px;font-weight:700;color:var(--green);font-family:var(--font-mono)}
.ehi-badge .label{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}
.alert-pills{display:flex;gap:4px}
.alert-pill{font-size:9px;font-weight:600;font-family:var(--font-mono);padding:2px 8px;cursor:pointer;border:none;background:none}
.alert-pill.critical{color:var(--red);background:rgba(255,68,68,.1)}
.alert-pill.high{color:var(--orange);background:rgba(255,136,0,.1)}
.search-btn{display:flex;align-items:center;gap:6px;background:var(--input-bg);border:1px solid var(--border);padding:4px 10px;cursor:pointer;font-size:11px;color:var(--text-muted);font-family:var(--font-mono)}
.search-btn:hover{border-color:var(--text-muted)}
.search-btn kbd{font-size:9px;color:var(--text-faint);background:var(--border);padding:1px 4px;margin-left:4px}
.icon-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);transition:all .15s;border:1px solid transparent;background:none;font-size:13px}
.icon-btn:hover{background:var(--overlay-light);color:var(--text)}

/* ===== MAIN CONTENT: CSS Grid (WM-style 60% | 6px | 1fr) ===== */
.main-content{flex:1 1 0;display:grid;grid-template-columns:var(--map-col-width,60%) 6px 1fr;grid-template-rows:1fr;gap:4px 0;overflow:hidden}

/* ===== LEFT COLUMN: map top ~50% + panels below ===== */
.left-col{grid-column:1;grid-row:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}

/* ===== MAP SECTION (top half of left column) ===== */
.map-section{flex:0 0 50%;max-height:50%;display:flex;flex-direction:column;border:1px solid var(--border);background:var(--surface);overflow:hidden;min-height:0}

/* ===== BELOW-MAP PANELS (bottom half of left column, scrollable) ===== */
.below-map{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:4px;padding:4px 0 0 0;min-height:0}
.below-map .panel{height:auto;min-height:0;flex-shrink:0}
.below-map .panel.span-2{grid-row:unset;min-height:0}
.below-map .below-map-row{display:grid;grid-template-columns:1fr 1fr;gap:4px;flex-shrink:0}
.map-section .panel-header{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 12px;background:var(--surface);border-bottom:1px solid var(--border)}
.map-container{flex:1;position:relative;background:var(--map-bg);overflow:hidden;min-height:0}

/* Map layers overlay */
.map-layers{position:absolute;top:8px;left:8px;background:rgba(20,20,20,.92);border:1px solid var(--border);padding:8px;min-width:140px;z-index:10;font-size:10px;backdrop-filter:blur(8px)}
.map-layers .ml-title{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin-bottom:6px}
.map-layer-item{display:flex;align-items:center;gap:6px;padding:2px 0;cursor:pointer;color:var(--text-dim);transition:color .15s}
.map-layer-item:hover{color:var(--text)}
.map-layer-item .dot{width:8px;height:8px;border-radius:50%;border:1.5px solid;flex-shrink:0}
.map-layer-item.active .dot{background:currentColor}

/* Map legend */
.map-legend{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);display:flex;gap:12px;font-size:9px;color:var(--text-dim);background:rgba(10,10,10,.85);padding:4px 12px;backdrop-filter:blur(4px)}

/* Map controls (top-right) */
.map-controls{position:absolute;top:8px;right:8px;display:flex;gap:4px;z-index:10}
.map-ctrl{background:rgba(20,20,20,.9);border:1px solid var(--border);padding:3px 8px;font-size:10px;color:var(--text-dim);cursor:pointer;font-family:var(--font-mono)}
.map-ctrl.active{background:var(--overlay-medium);color:var(--text)}
.map-ctrl:hover{border-color:var(--text-muted)}

/* Resize handle */
.resize-handle{grid-column:2;grid-row:1;cursor:col-resize;background:var(--border-subtle);transition:background .15s;width:6px}
.resize-handle:hover{background:var(--border)}

/* ===== PANELS GRID (right column, WM-style) ===== */
.panels-grid{grid-column:3;grid-row:1;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));grid-auto-flow:row dense;grid-auto-rows:minmax(200px,380px);gap:4px;padding:4px;align-content:start;align-items:stretch;overflow-y:auto;min-height:0}

/* ===== PANEL (WM-style: sharp corners, terminal aesthetic) ===== */
.panel{background:var(--surface);border:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;height:100%;min-height:200px;min-width:0;position:relative;contain:content}
.panel.span-2{grid-row:span 2;min-height:400px}
.panel.col-span-2{grid-column:span 2}
.panel-header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:6px 10px;background:var(--overlay-subtle);border-bottom:1px solid var(--border);flex-shrink:0}
.panel-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text);display:flex;align-items:center;gap:6px}
.panel-count{font-size:10px;color:var(--text-dim);background:var(--border);padding:2px 6px}
.panel-badge{font-size:8px;font-weight:700;padding:2px 6px;text-transform:uppercase;letter-spacing:.5px}
.badge-critical{background:rgba(255,68,68,.15);color:var(--red)}
.badge-high{background:rgba(255,136,0,.15);color:var(--orange)}
.badge-warn{background:rgba(255,170,0,.15);color:var(--yellow)}
.badge-info{background:rgba(51,136,255,.15);color:var(--blue)}
.badge-ok{background:rgba(68,255,136,.15);color:var(--green)}
.badge-ai{background:rgba(139,92,246,.15);color:var(--purple)}
.panel-content{flex:1;overflow-y:auto;padding:8px;min-width:0}
.panel-content::-webkit-scrollbar{width:4px}
.panel-content::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.panel-tabs{display:flex;gap:2px;padding:4px 10px 0;border-bottom:1px solid var(--border);flex-shrink:0}
.ptab{font-size:9px;padding:4px 8px;cursor:pointer;color:var(--text-muted);background:none;border:none;border-bottom:2px solid transparent;font-family:var(--font-mono);transition:all .15s}
.ptab.active{color:var(--text);border-bottom-color:var(--green)}
.ptab:hover:not(.active){color:var(--text-secondary)}
.panel-footer{padding:6px 10px;border-top:1px solid var(--border);font-size:9px;color:var(--text-dim);background:rgba(139,92,246,.03);flex-shrink:0}
.panel-footer .ai-icon{color:var(--purple);margin-right:3px}

/* ===== ITEM ROWS (WM news-item style) ===== */
.item{padding:6px 0;border-bottom:1px solid var(--border)}
.item:last-child{border-bottom:none}
.item.alert{border-left:2px solid var(--red);padding-left:8px;margin-left:-8px}
.item-source{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;display:flex;align-items:center;gap:6px}
.item-title{color:var(--text);font-size:12px;line-height:1.4;display:block}
.item-time{font-size:9px;color:var(--text-dim);margin-top:3px}
.item-meta{font-size:9px;color:var(--text-muted);margin-top:2px}

/* ===== ROW DATA (tables in panels) ===== */
.data-row{display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:11px}
.data-row:last-child{border-bottom:none}
.data-row:hover{background:var(--overlay-subtle)}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.bar-track{flex:1;height:4px;background:rgba(255,255,255,.06);overflow:hidden}
.bar-fill{height:100%;transition:width .6s}
.mono{font-family:var(--font-mono)}
.score{font-family:var(--font-mono);font-weight:700}
.dim-cell{font-size:8px;font-family:var(--font-mono);padding:1px 3px;display:inline-block}
.sparkline{display:inline-flex;align-items:flex-end;gap:1px;height:12px}
.spark-bar{width:2px;border-radius:1px}

/* ===== METRIC C应收账款DS (small KPI boxes) ===== */
.metric-row{display:flex;gap:4px;flex-wrap:wrap}
.metric-card{background:var(--overlay-subtle);border:1px solid var(--border);padding:6px 8px;flex:1;min-width:70px}
.mc-label{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.mc-value{font-size:16px;font-weight:700;font-family:var(--font-mono);color:var(--text)}
.mc-sub{font-size:9px;color:var(--text-dim)}

/* ===== FUNNEL B应收账款 ===== */
.funnel-row{display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.funnel-row:last-child{border-bottom:none}
.funnel-stage{width:50px;font-size:10px;color:var(--text-secondary);flex-shrink:0}
.funnel-count{width:24px;text-align:right;font-family:var(--font-mono);font-size:10px;color:var(--text);flex-shrink:0}
.funnel-bar{flex:1;height:10px;background:rgba(255,255,255,.04);overflow:hidden}
.funnel-fill{height:100%;transition:width .6s}

/* ===== EHI GAUGE (WM score circle) ===== */
.gauge-wrap{width:90px;height:90px;position:relative;flex-shrink:0}
.gauge-wrap svg{width:100%;height:100%}
.gauge-val{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center}
.gauge-num{font-size:24px;font-weight:700;font-family:var(--font-mono);line-height:1}
.gauge-label{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px}

/* ===== FOOTER (WM-style) ===== */
.site-footer{display:flex;align-items:center;justify-content:space-between;padding:8px 20px;font-size:11px;color:var(--text-dim);border-top:1px solid var(--border);flex-shrink:0;background:var(--surface)}
.footer-brand{font-weight:700;font-size:12px;color:var(--text-muted);letter-spacing:1px}
.footer-sub{font-size:9px;color:var(--text-faint)}
.footer-links{display:flex;gap:16px}
.footer-links a{color:var(--text-dim);text-decoration:none;font-size:10px;transition:color .15s}
.footer-links a:hover{color:var(--text)}

/* ===== AI CHAT FAB ===== */
.ai-fab{position:fixed;bottom:16px;right:16px;width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--blue));color:#fff;border:none;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(139,92,246,.4);z-index:200;transition:transform .2s}
.ai-fab:hover{transform:scale(1.08)}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}

/* ===== LIVE TOAST NOTIFICATIONS ===== */
.toast-container{position:absolute;top:40px;right:8px;width:260px;z-index:20;display:flex;flex-direction:column;gap:4px;pointer-events:none}
.toast{background:rgba(20,20,20,.94);border:1px solid var(--border);padding:6px 10px;font-size:9px;line-height:1.4;animation:toastIn .4s ease,toastOut .4s ease 4.6s forwards;backdrop-filter:blur(8px);pointer-events:auto;border-left:2px solid var(--text-dim)}
.toast.critical{border-left-color:var(--red)}
.toast.high{border-left-color:var(--orange)}
.toast.opportunity{border-left-color:var(--green)}
.toast.info{border-left-color:var(--blue)}
.toast.ai{border-left-color:var(--purple)}
.toast-tag{font-size:7px;font-weight:700;padding:1px 4px;margin-right:4px;text-transform:uppercase;letter-spacing:.5px;display:inline-block}
.toast-time{color:var(--text-faint);font-family:var(--font-mono);float:right}
.toast-body{color:var(--text-secondary);margin-top:2px}
@keyframes toastIn{from{opacity:0;transform:translateX(30px)}to{opacity:1;transform:translateX(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0;transform:translateY(-8px)}}

/* Map pulse ring for alerts */
@keyframes alertPulse{0%{r:8;opacity:.6}100%{r:25;opacity:0}}

/* ===== MODAL ===== */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.65);z-index:5000;display:flex;align-items:center;justify-content:center;animation:modalFadeIn .15s ease}
.modal-box{background:var(--surface);border:1px solid var(--border);width:min(600px,92vw);max-height:78vh;display:flex;flex-direction:column;font-size:12px}
.modal-header{display:flex;align-items:center;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--bg);flex-shrink:0}
.modal-header .modal-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text);flex:1}
.modal-header .modal-close{background:none;border:1px solid var(--border);color:var(--text-dim);font-size:14px;cursor:pointer;padding:0 6px;line-height:20px;font-family:var(--font-mono)}
.modal-header .modal-close:hover{color:var(--text);border-color:var(--text-muted)}
.modal-body{overflow-y:auto;padding:12px 14px;flex:1;min-height:0}
.modal-footer{border-top:1px solid var(--border);padding:8px 14px;font-size:10px;color:var(--text-secondary);display:flex;align-items:center;gap:6px;flex-shrink:0}
.modal-section{margin-bottom:10px}
.modal-section-title{font-size:9px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;padding-bottom:3px;border-bottom:1px solid var(--border)}
.modal-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;border-bottom:1px solid rgba(255,255,255,.03)}
.modal-row:last-child{border-bottom:none}
.modal-label{color:var(--text-dim);width:70px;font-size:10px;flex-shrink:0}
.modal-val{flex:1;color:var(--text)}
.modal-kpi{display:flex;gap:12px;margin-bottom:10px;flex-wrap:wrap}
.modal-kpi-item{background:var(--bg);border:1px solid var(--border);padding:8px 12px;flex:1;min-width:80px}
.modal-kpi-item .kpi-label{font-size:8px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px}
.modal-kpi-item .kpi-value{font-size:16px;font-weight:700;font-family:var(--font-mono);margin-top:2px}
.modal-kpi-item .kpi-sub{font-size:9px;color:var(--text-muted);margin-top:1px}
.modal-signal{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:10px;border-left:2px solid var(--border);padding-left:8px;margin:3px 0}
@keyframes modalFadeIn{from{opacity:0}to{opacity:1}}

/* ===== RESPONSIVE ===== */
@media(max-width:1599px){
  .main-content{display:flex;flex-direction:column}
  .left-col{flex:none;height:auto}
  .map-section{flex:none;height:40vh;max-height:40vh;min-height:250px}
  .below-map{flex:none;max-height:40vh;overflow-y:auto}
  .resize-handle{display:none}
  .panels-grid{flex:1;overflow-y:auto}
}
@media(max-width:768px){
  .header-center{display:none}
  .panels-grid{grid-template-columns:1fr}
  body{font-size:13px}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
// ===== DATA =====
const DATA = {
  ehi:{score:74,trend:'+2'},
  alerts:{critical:3,high:7},
  revenue:{current:2400,target:3200,pct:75},

  customers:[

    {name:'某国有银行',chi:82,r:90,e:75,d:88,o:70,trend:'up',amount:1450,rate:85,spark:[5,6,6,7,7,7,8,8,8,8],signals:[]},

    {name:'某电力运维平台',phi:65,remain:21,status:'normal',bar:58},
    {name:'某省政务云二期',phi:54,remain:12,status:'warn',bar:45,sig:'客户变更'},

// ===== UTILITIES =====
function dotColor(s){return s>=80?'var(--green)':s>=60?'var(--blue)':s>=40?'var(--yellow)':s>=20?'var(--orange)':'var(--red)'}
function scoreClass(s){return s>=80?'color:var(--green)':s>=60?'color:var(--blue)':s>=40?'color:var(--yellow)':s>=20?'color:var(--orange)':'color:var(--red)'}
function trendIcon(t){return t==='up'?'<span style="color:var(--green)">&#9650;</span>':t==='down'?'<span style="color:var(--red)">&#9660;</span>':'<span style="color:var(--text-muted)">&#9472;</span>'}
function badgeClass(l){return{CRITICAL:'badge-critical',HIGH:'badge-high',MEDIUM:'badge-warn',INFO:'badge-info',OPPORTUNITY:'badge-ok',ALERT:'badge-high',LOW:'badge-info'}[l]||'badge-info'}
function sparkHTML(data,h){h=h||12;const mx=Math.max(...data);return'<span class="sparkline" style="height:'+h+'px">'+data.map(function(v){const bh=Math.max(2,(v/mx)*h);const c=v>=mx*.7?'var(--green)':v>=mx*.4?'var(--blue)':'var(--red)';return'<span class="spark-bar" style="height:'+bh+'px;background:'+c+'"></span>'}).join('')+'</span>'}
function statusColor(s){return{healthy:'var(--green)',normal:'var(--blue)',warn:'var(--yellow)',danger:'var(--red)'}[s]||'var(--text-muted)'}

let showLayers=true;

// ===== HEADER (WM-style: left logo+status, center tabs, right controls) =====
function renderHeader(){
  return '<div class="header">'+
    '<div class="header-left">'+
      '<span class="logo">BINGOEAGLE<span class="logo-sub">MONITOR</span></span>'+
      '<span class="version-badge">v0.1</span>'+
      '<span class="status-dot"></span>'+
      '<div class="ehi-badge" onclick="showEHIOverview()"><div><div class="label">EHI</div><div class="score">'+DATA.ehi.score+'</div></div><span style="font-size:9px;color:var(--green)">'+DATA.ehi.trend+'</span></div>'+
      '<div class="alert-pills"><span class="alert-pill critical" onclick="showAlerts(\'critical\')">'+DATA.alerts.critical+' CRITICAL</span><span class="alert-pill high" onclick="showAlerts(\'high\')">'+DATA.alerts.high+' HIGH</span></div>'+
    '</div>'+
    '<div class="header-center">'+
      DATA.tabs.map(function(t,i){return '<button class="header-btn'+(i===0?' active':'')+'" data-dim="'+DATA.tabDimMap[t]+'" onclick="switchDim(this.dataset.dim)">'+t+'</button>'}).join('')+
    '</div>'+
    '<div class="header-right">'+
      '<span class="header-clock" id="live-clock">--:--:--</span>'+
      '<button class="search-btn" onclick="showSearch()">Search<kbd>&#8984;K</kbd></button>'+
      '<button class="icon-btn" onclick="toggleAIChat()">&#9733;</button>'+
      '<button class="icon-btn" onclick="showSettings()">&#9881;</button>'+
    '</div>'+
  '</div>'
}

function renderMapSection(){
  var c=DATA.mapCities;
  // Initial viewBox: zoomed to east/southeast coast (lon ~108-123, lat ~20-36)
  // In SVG coords: x=332, y=244, w=138, h=207 -> slightly wider for breathing room
  return '<div class="map-section">'+
    '<div class="panel-header">'+
      '<span class="panel-title">企业地图</span>'+
      '<span class="panel-count">'+c.length+'个城市</span>'+
      '<span style="flex:1"></span>'+
      '<button class="map-ctrl active" onclick="toggleMapLayers()">LAYERS</button>'+
      '<button class="map-ctrl active" onclick="toggleMapView(this,\'2d\')">2D</button>'+
      '<button class="map-ctrl" onclick="toggleMapView(this,\'3d\')">3D</button>'+
    '</div>'+
    '<div class="map-container" id="map-container">'+
      (showLayers?
      '<div class="map-layers" id="map-layers">'+
        '<div class="ml-title">DATA LAYERS</div>'+
        DATA.layers.map(function(l){return '<div class="map-layer-item'+(l.checked?' active':'')+'" onclick="toggleLayer(this,\''+l.name+'\')" style="color:'+l.color+'">'+
          '<span class="dot" style="border-color:'+l.color+';'+(l.checked?'background:'+l.color:'')+'"></span>'+
          '<span style="font-size:10px">'+l.name+'</span></div>'}).join('')+
      '</div>':'')+
      '<div class="map-controls">'+
        '<span style="font-size:9px;color:var(--text-dim)">ZOOM</span>'+
        '<button class="map-ctrl" onclick="mapZoom(1)">+</button>'+
        '<button class="map-ctrl" onclick="mapZoom(-1)">-</button>'+
      '</div>'+
      '<svg id="map-svg" viewBox="200 100 340 420" preserveAspectRatio="xMidYMid slice" style="width:100%;height:100%;cursor:grab">'+
        '<defs>'+
          '<radialGradient id="gl-g"><stop offset="0%" stop-color="rgba(68,255,136,.3)"/><stop offset="100%" stop-color="transparent"/></radialGradient>'+
          '<radialGradient id="gl-b"><stop offset="0%" stop-color="rgba(51,136,255,.3)"/><stop offset="100%" stop-color="transparent"/></radialGradient>'+
          '<radialGradient id="gl-y"><stop offset="0%" stop-color="rgba(255,170,0,.3)"/><stop offset="100%" stop-color="transparent"/></radialGradient>'+
          '<radialGradient id="gl-r"><stop offset="0%" stop-color="rgba(255,68,68,.3)"/><stop offset="100%" stop-color="transparent"/></radialGradient>'+
          '<pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">'+
            '<line x1="20" y1="0" x2="20" y2="20" stroke="rgba(10,42,32,.25)" stroke-width=".3"/>'+
            '<line x1="0" y1="20" x2="20" y2="20" stroke="rgba(10,42,32,.25)" stroke-width=".3"/>'+
          '</pattern>'+
        '</defs>'+
        '<rect x="0" y="0" width="600" height="500" fill="var(--map-bg)"/>'+
        '<rect x="0" y="0" width="600" height="500" fill="url(#grid)"/>'+
        // Render all province paths
        PROV_PATHS.map(function(p){
          return '<path d="'+p.d+'" fill="var(--map-country)" stroke="var(--map-stroke)" stroke-width=".5" stroke-linejoin="round"><title>'+p.n+'</title></path>'
        }).join('')+
        // City bubbles
        c.map(function(p,i){
          var dc=dotColor(p.chi);
          var gid=p.chi>=80?'gl-g':p.chi>=60?'gl-b':p.chi>=40?'gl-y':'gl-r';
          var r=Math.max(3,Math.sqrt(p.val/100));
          return '<g style="cursor:pointer" class="city-g" data-idx="'+i+'">'+
            '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+(r*2.5)+'" fill="url(#'+gid+')"/>'+
            '<circle cx="'+p.x+'" cy="'+p.y+'" r="'+r+'" fill="'+dc+'" opacity=".85">'+
              '<animate attributeName="r" values="'+r+';'+(r*1.15)+';'+r+'" dur="3s" repeatCount="indefinite"/>'+
            '</circle>'+
            '<text x="'+p.x+'" y="'+(p.y-r-3)+'" text-anchor="middle" font-size="8" fill="var(--text-secondary)" font-weight="600" font-family="var(--font-mono)">'+p.name+'</text>'+
            '<text x="'+p.x+'" y="'+(p.y+r+8)+'" text-anchor="middle" font-size="6" fill="var(--text-muted)" font-family="var(--font-mono)">¥'+p.val+'万 '+p.count+'客户</text>'+
          '</g>'}).join('')+
      '</svg>'+
      '<div class="map-legend">'+
        '<span style="color:var(--green)">&#9679; 健康</span>'+
        '<span style="color:var(--blue)">&#9679; 正常</span>'+
        '<span style="color:var(--yellow)">&#9679; 关注</span>'+
        '<span style="color:var(--red)">&#9679; 危险</span>'+
        '<span style="color:var(--text-muted)">| 气泡=合同额</span>'+
      '</div>'+
    '</div>'+
  '</div>'
}

function renderEHICustomers(){
  return DATA.customers.map(function(x,i){
    return '<div class="data-row" style="cursor:pointer" onclick="showCustomerDetail('+i+')"><span class="dot" style="background:'+dotColor(x.chi)+'"></span><span style="flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+x.name+'</span><span class="score" style="width:24px;text-align:right;'+scoreClass(x.chi)+'">'+x.chi+'</span><span style="width:60px;display:flex;gap:2px">'+[x.r,x.e,x.d,x.o].map(function(v){var bg=v>=80?'rgba(68,255,136,.2)':v>=60?'rgba(51,136,255,.2)':v>=40?'rgba(255,170,0,.2)':'rgba(255,68,68,.2)';var fc=v>=80?'var(--green)':v>=60?'var(--blue)':v>=40?'var(--yellow)':'var(--red)';return'<span class="dim-cell" style="background:'+bg+';color:'+fc+'">'+v+'</span>'}).join('')+'</span>'+sparkHTML(x.spark)+'<span class="mono" style="width:50px;text-align:right;font-size:10px">¥'+x.amount+'万</span><span style="width:12px;text-align:center">'+trendIcon(x.trend)+'</span></div>'+x.signals.map(function(s){return'<div style="padding:1px 0 1px 16px;font-size:9px;color:var(--text-muted);display:flex;align-items:center;gap:4px"><span class="panel-badge '+badgeClass(s.tag)+'" style="font-size:7px">'+s.tag+'</span>'+s.text+'</div>'}).join('')

}

// ===== PANELS ASSEMBLY BY DIMENSION =====
// Left column (below map): AI Brief, Intel Feed, Forecasts
function getLeftPanels(){
  switch(currentDim){
    case 'biz': return panelAIBrief()+panelIntelFeed()+panelForecasts();
    case 'delivery': return panelAIBrief()+panelForecasts()+panelIntelFeed();
    case 'finance': return panelAIBrief()+panelRevenue()+panelForecasts();

    default: return '';

// Right column (panels grid): EHI, Risk, Revenue, Projects, etc.

  switch(currentDim){
    case 'biz': return panelEHI()+panelCapitalMarket()+panelRisk()+panelRevenue()+panelFunnel()+panelProjects()+panelHR()+panelCompetitors()+panelPolicies()+panelDeps();
    case 'delivery': return panelProjects()+panelEHI()+panelRisk()+panelVendorEcosystem()+panelDeps()+panelHR()+panelPolicies()+panelForecasts();

// ===== DIMENSION SWITCHING =====
function switchDim(dimId){
  currentDim=dimId;
  document.querySelectorAll('.header-center .header-btn').forEach(function(el){el.classList.toggle('active',el.dataset.dim===dimId)});
  document.getElementById('below-map').innerHTML=getLeftPanels();
  document.getElementById('panels-grid').innerHTML=getRightPanels();
}

// ===== EHI TAB SWITCHING =====
function ehiTab(el,type){
  el.parentElement.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active')});
  el.classList.add('active');

// ===== MAP PAN & ZOOM =====
var mapVB={x:200,y:100,w:340,h:420}; // initial viewBox: wider view showing more of China
var mapDrag={active:false,sx:0,sy:0,svbx:0,svby:0};
function mapApplyVB(){
  var svg=document.getElementById('map-svg');
  if(svg)svg.setAttribute('viewBox',mapVB.x+' '+mapVB.y+' '+mapVB.w+' '+mapVB.h);
}
function mapZoom(dir){
  var factor=dir>0?0.8:1.25;
  var cx=mapVB.x+mapVB.w/2,cy=mapVB.y+mapVB.h/2;
  var nw=Math.max(60,Math.min(600,mapVB.w*factor));
  var nh=Math.max(50,Math.min(500,mapVB.h*factor));
  mapVB.x=cx-nw/2; mapVB.y=cy-nh/2; mapVB.w=nw; mapVB.h=nh;
  mapApplyVB();
}
function initMapDrag(){
  var container=document.getElementById('map-container');
  if(!container)return;
  container.addEventListener('mousedown',function(e){
    if(e.target.closest('.map-layers')||e.target.closest('.map-controls'))return;
    mapDrag.active=true;mapDrag.sx=e.clientX;mapDrag.sy=e.clientY;
    mapDrag.svbx=mapVB.x;mapDrag.svby=mapVB.y;
    var svg=document.getElementById('map-svg');if(svg)svg.style.cursor='grabbing';
    e.preventDefault();
  });
  document.addEventListener('mousemove',function(e){
    if(!mapDrag.active)return;
    var svg=document.getElementById('map-svg');if(!svg)return;
    var rect=svg.getBoundingClientRect();
    var scaleX=mapVB.w/rect.width, scaleY=mapVB.h/rect.height;
    mapVB.x=mapDrag.svbx-(e.clientX-mapDrag.sx)*scaleX;
    mapVB.y=mapDrag.svby-(e.clientY-mapDrag.sy)*scaleY;
    mapApplyVB();
  });
  document.addEventListener('mouseup',function(){
    if(mapDrag.active){mapDrag.active=false;var svg=document.getElementById('map-svg');if(svg)svg.style.cursor='grab';}
  });
  container.addEventListener('wheel',function(e){
    e.preventDefault();
    var svg=document.getElementById('map-svg');if(!svg)return;
    var rect=svg.getBoundingClientRect();
    var mx=(e.clientX-rect.left)/rect.width, my=(e.clientY-rect.top)/rect.height;
    var factor=e.deltaY>0?1.15:0.87;
    var nw=Math.max(60,Math.min(600,mapVB.w*factor));
    var nh=Math.max(50,Math.min(500,mapVB.h*factor));
    mapVB.x=mapVB.x+mx*(mapVB.w-nw);
    mapVB.y=mapVB.y+my*(mapVB.h-nh);
    mapVB.w=nw;mapVB.h=nh;
    mapApplyVB();
  },{passive:false});
}

// ===== SEARCH FUNCTIONS =====
function searchQuickQuery(text){
  document.querySelectorAll('div[style*="position:fixed"][style*="z-index:1000"]').forEach(function(m){m.remove()});
  var c=document.getElementById('ai-chat');
  if(!c)toggleAIChat();
  setTimeout(function(){
    var inp=document.querySelector('#ai-chat input');
    if(inp){inp.value=text;aiSend(inp)}
  },100);
}
function searchExecute(val){
  if(!val.trim())return;
  document.querySelectorAll('div[style*="position:fixed"][style*="z-index:1000"]').forEach(function(m){m.remove()});
  var results=[];
  DATA.customers.forEach(function(c,i){if(c.name.indexOf(val)>=0)results.push({type:'客户',name:c.name,idx:i,fn:'showCustomerDetail('+i+')'})});
  DATA.projects.forEach(function(p,i){if(p.name.indexOf(val)>=0)results.push({type:'项目',name:p.name,idx:i,fn:'showProjectDetail('+i+')'})});
  DATA.news.forEach(function(n,i){if(n.title.indexOf(val)>=0)results.push({type:'情报',name:n.title.substring(0,30),idx:i,fn:'showNewsDetail('+i+')'})});
  if(results.length===0){showModal('搜索结果','<div style="padding:20px;text-align:center;color:var(--text-dim)">未找到"'+val+'"相关结果</div>');return}

// ===== 2D/3D MAP VIEW =====
function toggleMapView(el,mode){
  el.parentElement.querySelectorAll('.map-ctrl').forEach(function(b){b.classList.remove('active')});
  el.classList.add('active');
  var svg=document.getElementById('map-svg');
  if(!svg)return;
  if(mode==='3d'){svg.style.transition='transform .4s';svg.style.transform='perspective(800px) rotateX(25deg) scale(1.05)'}
  else{svg.style.transition='transform .4s';svg.style.transform='none'}

// ===== MODAL UTILITY =====
function showModal(title,content,opts){
  opts=opts||{};
  closeModal();
  var ov=document.createElement('div');
  ov.className='modal-overlay';
  ov.addEventListener('click',function(e){if(e.target===ov)closeModal()});
  var box=document.createElement('div');
  box.className='modal-box';
  if(opts.width)box.style.width=opts.width;
  box.innerHTML='<div class="modal-header"><span class="modal-title">'+title+'</span><button class="modal-close" onclick="closeModal()">&#10005;</button></div>'+'<div class="modal-body">'+content+'</div>'+(opts.footer?'<div class="modal-footer"><span class="ai-icon">AI</span> '+opts.footer+'</div>':'');
  ov.appendChild(box);
  document.body.appendChild(ov);
  return box;
}
function closeModal(){document.querySelectorAll('.modal-overlay').forEach(function(m){m.remove()})}

function initLiveNotifications(){
  // Add toast container to map
  var mc=document.getElementById('map-container');
  if(!mc)return;
  var tc=document.createElement('div');
  tc.className='toast-container';
  tc.id='toast-container';
  mc.appendChild(tc);

  // Schedule each event
  LIVE_EVENTS.forEach(function(evt){
    setTimeout(function(){showToast(evt)},evt.delay);
  });
  // Loop events after all done
  var totalTime=LIVE_EVENTS[LIVE_EVENTS.length-1].delay+5000;
  setInterval(function(){
    LIVE_EVENTS.forEach(function(evt){
      setTimeout(function(){showToast(evt)},evt.delay);
    });
  },totalTime);
}

function showToast(evt){
  var tc=document.getElementById('toast-container');
  if(!tc)return;
  var now=new Date();
  var ts=now.getHours().toString().padStart(2,'0')+':'+now.getMinutes().toString().padStart(2,'0')+':'+now.getSeconds().toString().padStart(2,'0');

  // Create toast
  var t=document.createElement('div');
  t.className='toast '+evt.type;
  t.style.cursor='pointer';
  t.onclick=function(){showModal('实时预警',
    '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span class="panel-badge badge-'+(evt.type==='critical'?'critical':evt.type==='high'?'high':evt.type==='opportunity'?'ok':evt.type==='ai'?'ai':'info')+'">'+evt.tag+'</span>'+(evt.city?'<span style="color:var(--text-dim)">'+evt.city+'</span>':'')+'<span style="margin-left:auto;color:var(--text-dim);font-size:10px;font-family:var(--font-mono)">'+ts+'</span></div>'+
    '<div style="font-size:13px;line-height:1.6;color:var(--text);border-left:3px solid '+(evt.type==='critical'?'var(--red)':'var(--orange)')+';padding-left:10px;margin-bottom:12px">'+evt.text+'</div>'+
    '<div class="modal-section"><div class="modal-section-title">AI 建议</div><div style="font-size:11px;color:var(--purple);padding:4px 0">'+(evt.type==='critical'?'紧急事项，建议24h内处理。':evt.type==='high'?'高优先级，建议48h内跟进。':'已记录，按常规节奏跟进。')+'</div></div>',
    {footer:'点击已记录查阅，系统已自动通知相关负责人。'})};
  t.innerHTML='<span class="toast-tag panel-badge badge-'+(evt.type==='critical'?'critical':evt.type==='high'?'high':evt.type==='opportunity'?'ok':evt.type==='ai'?'ai':'info')+'">'+evt.tag+'</span>'+(evt.city?'<span style="color:var(--text-dim)">'+evt.city+'</span>':'')+'<span class="toast-time">'+ts+'</span><div class="toast-body">'+evt.text+'</div>';
  tc.insertBefore(t,tc.firstChild);

  // Remove after animation
  setTimeout(function(){if(t.parentNode)t.parentNode.removeChild(t)},5000);

  // Keep max 4 toasts
  while(tc.children.length>4){tc.removeChild(tc.lastChild)}

  // Flash city on map if applicable
  if(evt.cx&&evt.cy){
    flashCity(evt.cx,evt.cy,evt.type);
  }
}

function flashCity(cx,cy,type){
  var svg=document.getElementById('map-svg');
  if(!svg)return;
  var color=type==='critical'?'var(--red)':type==='high'?'var(--orange)':type==='opportunity'?'var(--green)':'var(--blue)';
  var ring=document.createElementNS('http://www.w3.org/2000/svg','circle');
  ring.setAttribute('cx',cx);
  ring.setAttribute('cy',cy);
  ring.setAttribute('r','8');
  ring.setAttribute('fill','none');
  ring.setAttribute('stroke',color);
  ring.setAttribute('stroke-width','1.5');
  ring.setAttribute('opacity','0.7');
  ring.style.animation='alertPulse 1.5s ease-out 3';
  svg.appendChild(ring);
  setTimeout(function(){if(ring.parentNode)ring.parentNode.removeChild(ring)},4500);
}

// ===== RESIZE HANDLE =====
function initResize(){
  var handle=document.querySelector('.resize-handle');
  if(!handle)return;
  var dragging=false;
  handle.addEventListener('mousedown',function(e){dragging=true;e.preventDefault()});
  document.addEventListener('mousemove',function(e){
    if(!dragging)return;
    var pct=Math.min(80,Math.max(30,(e.clientX/window.innerWidth)*100));
    document.querySelector('.main-content').style.setProperty('--map-col-width',pct+'%');
  });
  document.addEventListener('mouseup',function(){dragging=false});
}
